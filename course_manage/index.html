      ncm.parseErr = null;
      ncm.jsonPath = '';
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.id)    throw new Error('id フィールドがありません');
          if (!data.title) throw new Error('title フィールドがありません');
          ncm.parsed   = data;
          ncm.jsonPath = `courses/${data.id}.json`;
        } catch (err) {
          ncm.parseErr = err.message;
        }
        renderNewCourseModal();
      };
      reader.readAsText(file);
    };

    window.doSaveNewCourse = async function () {
      if (!ncm.parsed || ncm.parseErr || !ncm.jsonPath) return;
      if (state.courses.some(c => c.id === ncm.parsed.id)) return;
      if (state.courses.some(c => c.jsonPath === ncm.jsonPath)) return;

      ncm.status = 'uploading';
      renderNewCourseModal();
      try {
        const res = await fetch(`${API_BASE_URL}/upload-json`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
          body:    JSON.stringify({
            courseJsonPath: ncm.jsonPath,
            jsonData:       ncm.parsed,
          }),
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `HTTP ${res.status}`);
        }

        // state.courses に一時エントリを追加し、draftMap に登録
        const p = ncm.parsed;
        state.courses.push({
          id:           p.id,
          title:        p.title,
          summary:      p.summary || '',
          categories:   p.categories || [],
          version:      p.version || 0,
          coverImageUrl: p.coverImageUrl || null,
          spotCount:    allSpotsFromData(p).length,
          jsonPath:     ncm.jsonPath,
          updatedAt:    new Date().toISOString(),
          _isNew:       true,  // 本番 JSON がまだ存在しないことを示すフラグ
        });
        draftMap.set(p.id, p);

        ncm.status = 'success';
        renderNewCourseModal();
        showToast(`✓ ${p.title} をドラフットに保存しました`, 'success');
      } catch (err) {
        ncm.status = 'error';
        ncm.error  = err.message;
        renderNewCourseModal();
        showToast(`保存失敗: ${err.message}`, 'error');
      }
    };

    // ──────────────────────────────────────────────────────────────────────────
    // ドラフト差分ヘルパー
    // ──────────────────────────────────────────────────────────────────────────

    /** ドラフット JSON から特定スポットを返す */
    function getDraftSpot(spotId) {
      if (!state.draft) return null;
      if (state.draft.sections) {
        for (const sec of state.draft.sections) {
          const s = (sec.spots || []).find(s => s.spotId === spotId);
          if (s) return s;
        }
        return null;
      }
      return (state.draft.spots || []).find(s => s.spotId === spotId) || null;
    }

    /** ドラフット変更数（コース画像 + スポット画像）を返す */
    function countDraftChanges() {
      if (!state.draft || !state.detail) return 0;
      let count = 0;
      if (state.draft.coverImageUrl !== state.detail.coverImageUrl) count++;
      for (const spot of allSpots(state.detail)) {
        const ds = getDraftSpot(spot.spotId);
        if (ds && ds.coverImageUrl !== spot.coverImageUrl) count++;
      }
      return count;
    }

    /** ドラフットバナーの HTML を返す */
    function draftBanner() {
      const count = countDraftChanges();
      return `
        <div class="mb-5 bg-amber-50 border border-amber-300 rounded-xl px-4 py-3 flex items-center gap-3 shadow-sm">
          <div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5
                   m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-amber-800">ドラフトあり</p>
            <p class="text-xs text-amber-600 mt-0.5">
              ${count} 件の変更があります。本番に適用するとバージョンがインクリメントされます。
            </p>
          </div>
          <button onclick="doPublish()"
            class="flex-shrink-0 px-4 py-2 bg-amber-600 text-white text-sm font-semibold
                   rounded-xl hover:bg-amber-700 transition-colors shadow-sm">
            本番に適用
          </button>
        </div>`;
    }

    /** コースカバー画像エリアの HTML を返す（ドラフット差分時は左右分割表示）*/
    function renderCourseCoverImg(d) {
      if (state.draft && state.draft.coverImageUrl && state.draft.coverImageUrl !== d.coverImageUrl) {
        const liveImg  = d.coverImageUrl
          ? `<img src="${e(getDisplayUrl(d.coverImageUrl))}" class="absolute inset-0 w-full h-full object-cover" onerror="this.style.display='none'">`
          : '';
        const draftImg = `<img src="${e(getDisplayUrl(state.draft.coverImageUrl))}" class="absolute inset-0 w-full h-full object-cover" onerror="this.style.display='none'">`;
        return `
          <div class="absolute inset-0 flex">
            <div class="relative w-1/2 overflow-hidden">
              ${liveImg}
              <div class="absolute bottom-1.5 left-1.5 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded font-medium">現在</div>
            </div>
            <div class="w-px bg-white/40 z-10 self-stretch flex-shrink-0"></div>
            <div class="relative w-1/2 overflow-hidden">
              ${draftImg}
              <div class="absolute inset-0 ring-2 ring-amber-400 ring-inset pointer-events-none rounded-none"></div>
              <div class="absolute bottom-1.5 left-1.5 bg-amber-500 text-white text-[10px] px-1.5 py-0.5 rounded font-medium">変更後</div>
            </div>
          </div>`;
      }
      // 通常表示（ドラフット差分なし）
      if (!d.coverImageUrl) return '';
      const credit = d.imageCredit || null;
      return `
        <img src="${e(getDisplayUrl(d.coverImageUrl))}" alt="${e(d.title)}"
             class="absolute inset-0 w-full h-full object-cover"
             onerror="this.style.display='none'">
        ${credit ? `
        <div class="absolute bottom-1.5 right-1.5 text-white text-[9px] leading-tight
                    bg-black/55 px-1.5 py-0.5 rounded pointer-events-none max-w-[90%] truncate"
             title="${e(credit)}">
          🏷 ${e(credit)}
        </div>` : ''}`;
    }

    // ──────────────────────────────────────────────────────────────────────────
    // パブリッシュ（ドラフット → 本番適用）
    // ──────────────────────────────────────────────────────────────────────────
    window.doPublish = async function () {
      if (!state.draft || !state.currentSummary) return;
      const nextVer = (state.detail && state.detail.version != null)
        ? state.detail.version + 1 : 1;

      if (!confirm(`「${state.currentSummary.title}」のドラフットを本番に適用しますか？\nバージョンが v${nextVer} になります。`)) return;

      showToast('本番に適用中...', 'info');
      try {
        const res = await fetch(`${API_BASE_URL}/publish`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
          body:    JSON.stringify({
            courseJsonPath: state.currentSummary.jsonPath,
            courseId:       state.currentSummary.id,
          }),
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `HTTP ${res.status}`);
        }
        const result = await res.json();

        // state.detail をドラフットの内容で上書きし、バージョンをセット
        state.detail  = { ...state.draft, version: result.newVersion };
        state.draft   = null;

        // store/index.json の courses エントリも更新
        const c = state.courses.find(c => c.id === state.currentSummary.id);
        if (c) {
          c.version       = result.newVersion;
          c.coverImageUrl = state.detail.coverImageUrl;
          c.updatedAt     = new Date().toISOString();
        }

        renderDetail();
        showToast(`✓ 本番に適用しました（v${result.newVersion}）`, 'success');
      } catch (err) {
        showToast(`適用失敗: ${err.message}`, 'error');
      }
    };

    // ──────────────────────────────────────────────────────────────────────────
    // パスワード認証
    // ──────────────────────────────────────────────────────────────────────────
    const AUTH_KEY = 'kokokita_admin_auth';

    function isAuthenticated() {
      return sessionStorage.getItem(AUTH_KEY) === '1';
    }

    function showLoginScreen(errorMsg) {
      document.getElementById('backBtn').classList.add('hidden');
      document.getElementById('courseIdBadge').classList.add('hidden');
      mount(`
        <div class="fade-in flex items-center justify-center min-h-[70vh]">
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 w-full max-w-sm">
            <div class="text-center mb-6">
              <div class="text-3xl mb-2">📍</div>
              <h1 class="text-xl font-bold text-gray-900">コース管理</h1>
              <p class="text-xs text-gray-400 mt-1">管理者のみアクセス可能です</p>
            </div>
            ${errorMsg
              ? `<div class="mb-4 px-3 py-2 bg-red-50 border border-red-200 rounded-lg text-xs text-red-600">${e(errorMsg)}</div>`
              : ''}
            <form onsubmit="handleLogin(event)">
              <div class="mb-4">
                <label class="block text-xs font-medium text-gray-600 mb-1.5">パスワード</label>
                <input id="passwordInput" type="password" autofocus
                  class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm
                         focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                  placeholder="パスワードを入力">
              </div>
              <button type="submit"
                class="w-full py-2.5 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700 transition-colors">
                ログイン
              </button>
            </form>
          </div>
        </div>
      `);
    }

    window.handleLogin = async function (event) {
      event.preventDefault();
      const input = document.getElementById('passwordInput').value;
      if (!input) return;

      // SHA-256 ハッシュを計算してサーバーサイドに送らず、ブラウザ内で照合
      const encoder  = new TextEncoder();
      const hashBuf  = await crypto.subtle.digest('SHA-256', encoder.encode(input));
      const hashHex  = Array.from(new Uint8Array(hashBuf))
        .map(b => b.toString(16).padStart(2, '0')).join('');

      if (PASSWORD_HASH === 'YOUR-PASSWORD-HASH') {
        // 未設定時はパスワード不要でアクセス（開発用フォールバック）
        sessionStorage.setItem(AUTH_KEY, '1');
        init();
      } else if (hashHex === PASSWORD_HASH) {
        sessionStorage.setItem(AUTH_KEY, '1');
        init();
      } else {
        showLoginScreen('パスワードが正しくありません');
      }
    };

    window.logout = function () {
      sessionStorage.removeItem(AUTH_KEY);
      showLoginScreen();
    };

    // ──────────────────────────────────────────────────────────────────────────
    // 起動
    // ──────────────────────────────────────────────────────────────────────────
    if (isAuthenticated()) {
      init();
    } else {
      showLoginScreen();
    }

  })();
  </script>
</body>
</html>
