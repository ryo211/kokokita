<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コース管理 | kokokita</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeInUp 0.15s ease-out forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.7s linear infinite; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.2s ease-out forwards; }
    .drop-zone-active { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased">

  <!-- ヘッダー -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-5 h-14 flex items-center gap-2 sm:gap-3">
      <button id="backBtn" onclick="goBack()"
        class="hidden items-center gap-1 text-blue-600 hover:text-blue-700 text-sm font-medium transition-colors flex-shrink-0 py-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        一覧に戻る
      </button>
      <div class="flex items-center gap-2">
        <span class="text-base font-bold text-gray-900">📍 コース管理</span>
      </div>
      <div id="courseIdBadge"
        class="ml-auto text-xs text-gray-400 bg-gray-100 px-2 py-1.5 rounded font-mono hidden truncate max-w-[120px] sm:max-w-xs">
      </div>
      <button onclick="logout()"
        class="ml-2 sm:ml-3 text-xs text-gray-400 hover:text-gray-600 flex-shrink-0 hidden py-2 px-1" id="logoutBtn">
        ログアウト
      </button>
    </div>
  </header>

  <!-- アップロードモーダル -->
  <div id="uploadModal"
    class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm"
    onclick="onModalBackdropClick(event)">
    <div id="modalContent" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <!-- JS でレンダリング -->
    </div>
  </div>

  <!-- スポット編集モーダル -->
  <div id="spotEditModal"
    class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm"
    onclick="onSpotEditModalBackdropClick(event)">
    <div id="spotEditModalContent" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    </div>
  </div>

  <!-- 新規コース追加モーダル -->
  <div id="newCourseModal"
    class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm"
    onclick="onNewCourseModalBackdropClick(event)">
    <div id="newCourseModalContent" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <!-- JS でレンダリング -->
    </div>
  </div>

  <!-- スポット追加モーダル -->
  <div id="addSpotModal"
    class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm"
    onclick="onAddSpotModalBackdropClick(event)">
    <div id="addSpotModalContent" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    </div>
  </div>

  <!-- ジオコーディングモーダル -->
  <div id="geocodeModal"
    class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
    <div id="geocodeModalContent" class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
    </div>
  </div>

  <!-- コース設定編集モーダル -->
  <div id="courseEditModal"
    class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm"
    onclick="onCourseEditModalBackdropClick(event)">
    <div id="courseEditModalContent" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    </div>
  </div>

  <!-- JSON アップロードモーダル -->
  <div id="jsonModal"
    class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm"
    onclick="onJsonModalBackdropClick(event)">
    <div id="jsonModalContent" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <!-- JS でレンダリング -->
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast" class="fixed bottom-5 right-5 z-[200] flex flex-col gap-2 pointer-events-none"></div>

  <!-- コンテンツ -->
  <main id="root" class="max-w-6xl mx-auto px-4 sm:px-5 py-5 sm:py-6">
    <div class="flex items-center justify-center py-24">
      <svg class="w-7 h-7 text-blue-500 spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>
  </main>

  <script>
  (() => {
    'use strict';

    // ──────────────────────────────────────────────────────────────────────────
    // 設定
    // ──────────────────────────────────────────────────────────────────────────
    const BASE_URL     = 'https://kokokita-app.irodoriq.com/course/';
    // Lambda API Gateway の URL と管理シークレットを設定してください
    // const API_BASE_URL   = 'https://aikquzning.execute-api.ap-northeast-1.amazonaws.com/prod';
    const API_BASE_URL   = 'https://32geew526zqluybtf5km7zitui0etoee.lambda-url.ap-northeast-1.on.aws'
    const ADMIN_SECRET   = 'aa5c36329c4d6b482bbf6d1b6a89f6c31258394d31c394778e205161932024b0';  // sam deploy で設定した AdminSecret と同じ値

    // パスワードの SHA-256 ハッシュ（変更方法: echo -n "パスワード" | shasum -a 256）
    const PASSWORD_HASH  = 'b7ed6e0f6fc03ce33bc7c589c1d8f4ec9571949599a713a3f9daa1a9ea28fa74'; // 例: echo -n "kokokita-admin" | shasum -a 256

    const API_CONFIGURED = !API_BASE_URL.includes('YOUR-API');

    // Google Maps Geocoding API キー（localStorage から読み込む。未設定なら空文字）
    let gmApiKey = localStorage.getItem('gm_api_key') || '';

    // ──────────────────────────────────────────────────────────────────────────
    // 定数
    // ──────────────────────────────────────────────────────────────────────────
    const CAT = {
      history_culture:    { label: '歴史・文化',      cls: 'bg-amber-100 text-amber-800' },
      nature:             { label: '自然',            cls: 'bg-emerald-100 text-emerald-800' },
      art_entertainment:  { label: 'アート・エンタメ',  cls: 'bg-purple-100 text-purple-800' },
      movie_drama:        { label: '映画・ドラマ',     cls: 'bg-rose-100 text-rose-800' },
      travel_sightseeing: { label: '旅行・観光',      cls: 'bg-sky-100 text-sky-800' },
      anime:              { label: 'アニメ・漫画',     cls: 'bg-blue-100 text-blue-800' },
    };

    const SRC = {
      bundled:    { label: '同梱',     cls: 'bg-slate-100 text-slate-600' },
      downloaded: { label: 'ストア',   cls: 'bg-indigo-100 text-indigo-700' },
      user:       { label: 'ユーザー', cls: 'bg-pink-100 text-pink-700' },
    };

    // ──────────────────────────────────────────────────────────────────────────
    // 状態
    // ──────────────────────────────────────────────────────────────────────────
    const state = {
      courses:        [],    // store/index.json の courses 配列
      detail:         null,  // 現在表示中のコース全 JSON（本番）
      draft:          null,  // ドラフト JSON（存在しない場合は null）
      currentSummary: null,  // 現在表示中のコースの store/index.json エントリ
      view:           'list',
      catFilter:      'all',
      statusFilter:   'all',  // 'all' | 'published' | 'unpublished'
    };

    // 画像アップロードモーダルの状態
    const modal = {
      target:      null,  // アップロード対象情報
      file:        null,  // 選択されたファイル
      previewUrl:  null,  // 変換後のプレビュー URL
      status:      'idle', // 'idle' | 'uploading' | 'success' | 'error'
      progress:    0,
      result:      null,
      error:       null,
      imageCredit: null,  // Wikimedia クレジット文字列（手動アップ時は null）
      wm: {               // Wikimedia 検索状態
        open:      false,
        query:     '',
        limit:     5,
        searching: false,
        results:   [],
        error:     null,
      },
    };

    // セッション中にアップロードされたドラフットを管理（courseId → draft データ）
    const draftMap = new Map();

    // スポット編集モーダルの状態
    const sem = { spotId: null };

    // 新規コース追加モーダルの状態
    const ncm = {
      file:     null,
      parsed:   null,
      parseErr: null,
      jsonPath: '',   // S3 保存先パス（例: courses/my-course-001.json）
      status:   'idle', // 'idle' | 'uploading' | 'success' | 'error'
      error:    null,
    };

    // JSON アップロードモーダルの状態
    const jm = {
      summary:  null,   // 対象コースの store/index エントリ
      file:     null,   // 選択された .json ファイル
      parsed:   null,   // パース済み JSON オブジェクト
      parseErr: null,   // パースエラーメッセージ
      status:   'idle', // 'idle' | 'uploading' | 'success' | 'error'
      error:    null,
    };

    // アップロードログ（セッション内のみ）
    const uploadLog = [];

    // ブラウザキャッシュ破壊用（アップロード後の画像を即時反映するため）
    const cacheBustMap = new Map();

    // ──────────────────────────────────────────────────────────────────────────
    // 初期化
    // ──────────────────────────────────────────────────────────────────────────
    async function init() {
      // ログアウトボタンを表示
      document.getElementById('logoutBtn').classList.remove('hidden');
      mount(loadingHTML());
      try {
        // store/index.json と /list-drafts を並列取得
        const storeResProm = fetch(`${BASE_URL}store/index.json?_t=${Date.now()}`);
        const draftsResProm = API_CONFIGURED
          ? fetch(`${API_BASE_URL}/list-drafts`, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
              body:    JSON.stringify({}),
            })
          : Promise.resolve(null);

        const [storeRes, draftsRes] = await Promise.all([storeResProm, draftsResProm]);
        if (!storeRes.ok) throw new Error(`HTTP ${storeRes.status}: store/index.json`);
        const data = await storeRes.json();
        state.courses = data.courses || [];

        // ドラフット一覧を処理
        if (draftsRes && draftsRes.ok) {
          const draftsData = await draftsRes.json();
          for (const d of (draftsData.drafts || [])) {
            if (d.isNew) {
              // 未公開の新規コース → 仮エントリを追加（_isNew フラグ付き）
              const alreadyExists = state.courses.some(c => c.id === d.id);
              if (!alreadyExists) {
                state.courses.push({
                  id:            d.id,
                  title:         d.title,
                  summary:       d.summary,
                  categories:    d.categories || [],
                  version:       d.version,
                  coverImageUrl: d.coverImageUrl,
                  spotCount:     d.spotCount,
                  spotImgCount:  d.spotImgCount,
                  jsonPath:      d.courseJsonPath,
                  updatedAt:     null,
                  _isNew:        true,
                });
              }
            } else {
              // 既存コースのドラフット → draftMap に記録（バッジ表示用）
              draftMap.set(d.id, { _metaOnly: true, courseJsonPath: d.courseJsonPath });
            }
          }
        }

        renderList();
      } catch (err) {
        renderError('コース一覧を読み込めませんでした', err.message);
      }
    }
    window.init = init;

    // ──────────────────────────────────────────────────────────────────────────
    // ヘッダー
    // ──────────────────────────────────────────────────────────────────────────
    function setHeader(showBack, courseId) {
      const btn   = document.getElementById('backBtn');
      const badge = document.getElementById('courseIdBadge');
      btn.classList.toggle('hidden', !showBack);
      btn.classList.toggle('flex', showBack);
      if (courseId) {
        badge.textContent = courseId;
        badge.classList.remove('hidden');
      } else {
        badge.textContent = '';
        badge.classList.add('hidden');
      }
    }

    window.goBack = function () {
      state.view           = 'list';
      state.detail         = null;
      state.draft          = null;
      state.currentSummary = null;
      setHeader(false);
      renderList();
    };

    // ──────────────────────────────────────────────────────────────────────────
    // コース一覧
    // ──────────────────────────────────────────────────────────────────────────
    function renderList() {
      state.view = 'list';
      setHeader(false);

      let filtered = state.catFilter === 'all'
        ? state.courses
        : state.courses.filter(c => (c.categories || []).includes(state.catFilter));
      if (state.statusFilter === 'published')   filtered = filtered.filter(c => !c._isNew);
      if (state.statusFilter === 'unpublished') filtered = filtered.filter(c => c._isNew);

      mount(`
        <div class="fade-in">
          ${!API_CONFIGURED ? apiWarningBanner() : ''}
          <div class="flex items-start justify-between gap-3 mb-5">
            <div class="flex flex-col gap-2">
              <div class="flex flex-wrap gap-1.5">${statusFilterChips()}</div>
              <div class="flex flex-wrap gap-1.5">${filterChips()}</div>
            </div>
            ${API_CONFIGURED ? `
              <button onclick="openNewCourse()"
                class="flex items-center gap-1.5 text-sm font-medium bg-blue-600 text-white
                       px-3.5 py-2 rounded-xl hover:bg-blue-700 transition-colors flex-shrink-0 shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                新規コース追加
              </button>` : ''}
          </div>
          ${courseSummaryBar(filtered)}
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            ${filtered.map(courseCard).join('')}
          </div>
        </div>
      `);
    }

    function courseSummaryBar(filtered) {
      const total      = filtered.length;
      const published  = filtered.filter(c => !c._isNew).length;
      const draft      = filtered.filter(c => c._isNew).length;
      const withDraft  = filtered.filter(c => !c._isNew && draftMap.has(c.id)).length;
      const totalSpots = filtered.reduce((sum, c) => sum + (c.spotCount || 0), 0);

      // カテゴリ別件数（複数カテゴリ持ちは各カテゴリに加算）
      const catCount = {};
      for (const c of filtered) {
        for (const cat of (c.categories || [])) {
          catCount[cat] = (catCount[cat] || 0) + 1;
        }
      }
      const catEntries = Object.entries(CAT)
        .map(([id, meta]) => ({ id, meta, count: catCount[id] || 0 }))
        .filter(e => e.count > 0)
        .sort((a, b) => b.count - a.count);
      const noCat = filtered.filter(c => !(c.categories || []).length).length;

      return `
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm px-5 py-4 mb-5">
          <!-- 上段: 合計 / リリース済み / 未公開 -->
          <div class="flex flex-wrap gap-x-6 gap-y-2 items-center mb-3 pb-3 border-b border-gray-100">
            <div class="flex items-baseline gap-3">
              <div class="flex items-baseline gap-1.5">
                <span class="text-2xl font-bold text-gray-900">${total}</span>
                <span class="text-xs text-gray-400">コース</span>
              </div>
              <div class="flex items-baseline gap-1.5">
                <span class="text-xl font-bold text-indigo-600">${totalSpots.toLocaleString()}</span>
                <span class="text-xs text-gray-400">スポット</span>
              </div>
            </div>
            <div class="flex flex-wrap gap-4 text-sm">
              <span class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-emerald-400 inline-block"></span>
                <span class="text-gray-500">リリース済み</span>
                <span class="font-semibold text-gray-800">${published}</span>
              </span>
              ${withDraft > 0 ? `
              <span class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-amber-400 inline-block"></span>
                <span class="text-gray-500">ドラフットあり</span>
                <span class="font-semibold text-amber-700">${withDraft}</span>
              </span>` : ''}
              ${draft > 0 ? `
              <span class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-gray-300 inline-block"></span>
                <span class="text-gray-500">未公開</span>
                <span class="font-semibold text-gray-600">${draft}</span>
              </span>` : ''}
            </div>
          </div>
          <!-- 下段: カテゴリ別件数 -->
          <div class="flex flex-wrap gap-2">
            ${catEntries.map(({ id, meta, count }) => `
              <button onclick="setCatFilter('${id}')"
                class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs
                       ${meta.cls} hover:opacity-80 transition-opacity">
                <span class="font-medium">${meta.label}</span>
                <span class="font-bold">${count}</span>
              </button>`).join('')}
            ${noCat > 0 ? `
              <span class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs
                           bg-gray-100 text-gray-500">
                <span>未分類</span>
                <span class="font-bold">${noCat}</span>
              </span>` : ''}
          </div>
        </div>`;
    }

    function apiWarningBanner() {
      return `
        <div class="mb-5 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-sm text-amber-800">
          ⚠️ <strong>API 未設定</strong>:
          index.html の <code class="bg-amber-100 px-1 rounded">API_BASE_URL</code> と
          <code class="bg-amber-100 px-1 rounded">API_KEY</code> を設定するまで、
          画像アップロードは利用できません。
        </div>`;
    }

    function statusFilterChips() {
      const items = [
        { id: 'all',         label: '全て',   icon: '' },
        { id: 'published',   label: '公開済み', icon: '🟢 ' },
        { id: 'unpublished', label: '未公開',   icon: '🟡 ' },
      ];
      return items.map(({ id, label, icon }) => {
        const active = state.statusFilter === id;
        return `
          <button onclick="setStatusFilter('${id}')"
            class="px-3 py-1 rounded-full text-xs font-medium transition-colors
              ${active
                ? 'bg-gray-800 text-white shadow-sm'
                : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}">
            ${icon}${label}
          </button>`;
      }).join('');
    }

    function filterChips() {
      const items = [
        { id: 'all', label: '全て' },
        ...Object.entries(CAT).map(([id, m]) => ({ id, label: m.label })),
      ];
      return items.map(({ id, label }) => {
        const active = state.catFilter === id;
        return `
          <button onclick="setCatFilter('${id}')"
            class="px-3.5 py-1.5 rounded-full text-sm font-medium transition-colors
              ${active
                ? 'bg-blue-600 text-white shadow-sm'
                : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}">
            ${label}
          </button>`;
      }).join('');
    }

    function courseCard(c) {
      const cats    = (c.categories || []).map(id => badge(id, CAT)).join('');
      const date    = c.updatedAt
        ? new Date(c.updatedAt).toLocaleDateString('ja-JP',
            { year: 'numeric', month: 'short', day: 'numeric' })
        : '–';
      const imgSrc  = getDisplayUrl(c.coverImageUrl);
      const imgId   = getCourseImageId(c);

      return `
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden
                    cursor-pointer hover:shadow-md hover:-translate-y-0.5 transition-all group relative"
             onclick="openCourse('${e(c.id)}')">

          <!-- カバー画像 -->
          <div class="relative h-44 bg-gray-100 flex items-center justify-center overflow-hidden">
            ${imgSrc
              ? `<img src="${e(imgSrc)}" alt="${e(c.title)}"
                     class="absolute inset-0 w-full h-full object-cover
                            group-hover:scale-105 transition-transform duration-300"
                     onerror="this.style.display='none'">`
              : ''}
            ${svgImgIcon('absolute w-8 h-8 text-gray-300 pointer-events-none')}
            <div class="absolute top-2 right-2 flex flex-wrap gap-1 justify-end">${cats}</div>

            <!-- カメラボタン（ホバー時表示） -->
            ${API_CONFIGURED ? `
              <button onclick="event.stopPropagation(); openUpload({
                type: 'course',
                label: '${e(c.title)}',
                imageId: '${e(imgId)}',
                courseJsonPath: '${e(c.jsonPath)}',
                courseId: '${e(c.id)}',
                spotId: null,
                currentImageUrl: '${e(getDisplayUrl(c.coverImageUrl) || '')}'
              })"
                class="absolute bottom-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity
                       bg-black/60 hover:bg-black/80 text-white rounded-lg px-2.5 py-1.5
                       text-xs flex items-center gap-1.5 backdrop-blur-sm">
                ${svgCamera('w-3.5 h-3.5')}
                画像を設定
              </button>` : ''}
          </div>

          <!-- テキスト -->
          <div class="p-4">
            <h3 class="font-bold text-gray-900 text-sm mb-1 line-clamp-2">${e(c.title)}</h3>
            <p class="text-xs text-gray-500 line-clamp-2 mb-3">${e(c.summary || '')}</p>
            <div class="flex items-center justify-between text-xs text-gray-400">
              <div class="flex items-center gap-2">
                <span>📍 ${c.spotCount} スポット</span>
                ${(c.spotImgCount != null && c.spotCount > 0) ? (() => {
                  const pct = Math.round(c.spotImgCount / c.spotCount * 100);
                  const col = pct === 100 ? 'text-emerald-600' : pct >= 50 ? 'text-amber-500' : 'text-orange-400';
                  return `<span class="${col}">🖼 ${c.spotImgCount}/${c.spotCount}</span>`;

    // ──────────────────────────────────────────────────────────────────────────
    // コース詳細を開く
    // ──────────────────────────────────────────────────────────────────────────
    window.openCourse = async function (courseId) {
      const summary = state.courses.find(c => c.id === courseId);
      if (!summary) return;

      state.view           = 'detail';
      state.currentSummary = summary;
      state.draft          = null;
      setHeader(true, summary.id);
      mount(loadingHTML());

      try {
        // 新規追加コースは本番 JSON が存在しないため、ドラフットを取得して使用
        if (summary._isNew) {
          // セッション内でアップロード済みの場合は draftMap を優先
          if (draftMap.has(summary.id) && !draftMap.get(summary.id)._metaOnly) {
            const draftData = draftMap.get(summary.id);
            state.detail = draftData;
            state.draft  = draftData;
            renderDetail();
            return;
          }
          // それ以外（ページリロード後等）は /get-draft から取得
          if (API_CONFIGURED) {
            const res = await fetch(`${API_BASE_URL}/get-draft`, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
              body:    JSON.stringify({ courseJsonPath: summary.jsonPath }),
            });
            if (res.ok) {
              const draftData = await res.json();
              if (draftData.exists) {
                state.detail = draftData.draft;
                state.draft  = draftData.draft;
                renderDetail();
                return;
              }
            }
          }
          renderError('コース詳細を読み込めませんでした', 'ドラフットが見つかりません');
          return;
        }

        const detailProm = fetch(`${BASE_URL}${summary.jsonPath}?_t=${Date.now()}`);
        const draftProm  = API_CONFIGURED
          ? fetch(`${API_BASE_URL}/get-draft`, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
              body:    JSON.stringify({ courseJsonPath: summary.jsonPath }),
            })
          : Promise.resolve(null);

        const [detailRes, draftRes] = await Promise.all([detailProm, draftProm]);
        if (!detailRes.ok) throw new Error(`HTTP ${detailRes.status}: ${summary.jsonPath}`);
        state.detail = await detailRes.json();

        if (draftRes && draftRes.ok) {
          const draftData = await draftRes.json();
          state.draft = draftData.exists ? draftData.draft : null;
        }

        renderDetail();
      } catch (err) {
        renderError('コース詳細を読み込めませんでした', err.message);
      }
    };

    window.filterSpots = function (onlyNoImg) {
      document.querySelectorAll('[data-has-img]').forEach(row => {
        row.style.display = (onlyNoImg && row.dataset.hasImg === '1') ? 'none' : '';
      });
      document.querySelectorAll('[data-section]').forEach(sec => {
        if (!onlyNoImg) { sec.style.display = ''; return; }
        const visible = [...sec.querySelectorAll('[data-has-img]')]
          .filter(r => r.style.display !== 'none').length;
        sec.style.display = visible === 0 ? 'none' : '';
      });
      document.getElementById('fAll').className =
        `px-3 py-1.5 rounded-full text-sm font-medium ${!onlyNoImg
          ? 'bg-blue-600 text-white'
          : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`;
      document.getElementById('fNoImg').className =
        `px-3 py-1.5 rounded-full text-sm font-medium ${onlyNoImg
          ? 'bg-orange-500 text-white'
          : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`;
    };

      const spots = (sec.spots || []).slice().sort((a, b) => a.orderIndex - b.orderIndex);

      const hasDraftChange = !!(draftSpot && draftSpot.coverImageUrl !== spot.coverImageUrl);

            </div>

              ? `<p class="text-xs text-gray-500 mt-0.5 line-clamp-2">${e(spot.spotDescription)}</p>`

    // ──────────────────────────────────────────────────────────────────────────
    // アップロードログ
    // ──────────────────────────────────────────────────────────────────────────
    function renderUploadLog() {
      const entries = uploadLog.slice(0, 10);
      return `
        <div class="mt-8">
          <h3 class="font-semibold text-gray-800 text-sm mb-3">

            <div class="divide-y divide-slate-50">
              ${entries.map(logEntry).join('')}
            </div>
          </div>
        </div>`;
    }

    function logEntry(entry) {
      const time = entry.ts.toLocaleTimeString('ja-JP');
      return `
        <div class="flex items-start gap-3 px-4 py-3">
          <div class="w-5 h-5 rounded-full flex-shrink-0 flex items-center justify-center mt-0.5
                      ${entry.success ? 'bg-emerald-100' : 'bg-red-100'}">
            <svg class="w-3 h-3 ${entry.success ? 'text-emerald-600' : 'text-red-500'}"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              ${entry.success
                ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>'}

          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 text-xs">
              <span class="font-medium text-gray-800">${e(entry.label)}</span>
              <span class="text-gray-400">${time}</span>
              <span class="${entry.type === 'course' ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-600'}
                          px-1.5 py-0.5 rounded text-xs">
                ${entry.type === 'course' ? 'コース画像' : 'スポット画像'}
              </span>
            </div>
            ${entry.success
              ? `<p class="text-xs text-gray-400 font-mono mt-0.5 truncate">${e(entry.publicUrl)}</p>
                 <p class="text-xs text-gray-400 mt-0.5">CF無効化: ${(entry.invalidatedPaths || []).join(', ')}</p>`
              : `<p class="text-xs text-red-400 mt-0.5">${e(entry.error || '')}</p>`
            }

        </div>`;
    }

    // ──────────────────────────────────────────────────────────────────────────
    // アップロードモーダル
    // ──────────────────────────────────────────────────────────────────────────

    /** スポット行のボタンから target を組み立てて openUpload を呼ぶ */
    window.openUploadFromBtn = function (btn) {
      openUpload({
        type:            btn.dataset.uploadType,
        label:           btn.dataset.uploadLabel,
        imageId:         btn.dataset.uploadImgid,
        courseJsonPath:  btn.dataset.uploadJsonpath,
        courseId:        btn.dataset.uploadCourseid,
        spotId:          btn.dataset.uploadSpotid || null,
        currentImageUrl: btn.dataset.uploadCurrentUrl || null,
      });
    };

    /** アップロードモーダルを開く */
    window.openUpload = function (target) {
      if (!API_CONFIGURED) {
        showToast('API が未設定です。index.html の API_BASE_URL を設定してください。', 'error');
        return;
      }
      Object.assign(modal, {
        target, file: null, previewUrl: null,
        status: 'idle', progress: 0, result: null, error: null,
        imageCredit: null,
        wm: { open: false, query: target.label || '', limit: parseInt(localStorage.getItem('wm_limit') || '5'), searching: false, results: [], error: null },
      });
      renderModal();
      const el = document.getElementById('uploadModal');
      el.classList.remove('hidden');
      el.classList.add('flex');
    };

    window.onModalBackdropClick = function (event) {
      // バツボタンでのみ閉じる（バックドロップクリックでは閉じない）
    };

    window.closeModal = function () {
      const el = document.getElementById('uploadModal');
      el.classList.add('hidden');
      el.classList.remove('flex');
      if (modal.result && state.view === 'detail') renderDetail();
    };

    function renderModal() {
      const content = document.getElementById('modalContent');
      const target  = modal.target;

      if (modal.status === 'uploading') {
        content.innerHTML = `
          <div class="p-6 text-center">
            <p class="font-semibold text-gray-800 mb-1">アップロード中...</p>
            <p class="text-xs text-gray-400 mb-4">${e(target.label)}</p>

        return;
      }

      if (modal.status === 'success') {
        const r = modal.result;
        content.innerHTML = `
          <div class="p-6">
            <div class="flex items-center gap-2 mb-4">
              <div class="w-7 h-7 rounded-full bg-emerald-100 flex items-center justify-center">
                <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                </svg>
              </div>
              <h3 class="font-bold text-gray-900">アップロード完了</h3>
            </div>
            <img src="${e(r.publicUrl)}?v=${Date.now()}" alt="アップロード済み画像"
                 class="w-full h-48 object-cover rounded-xl mb-4 bg-gray-100">
            <div class="space-y-2 text-xs">
              <div class="flex gap-2">
                <span class="w-20 text-gray-400 flex-shrink-0">S3 パス</span>
                <span class="font-mono text-gray-700 break-all">${e(r.publicUrl.replace('https://kokokita-app.irodoriq.com/course/', ''))}</span>
              </div>

                ? `<div class="flex gap-2">
                     <span class="w-20 text-gray-400 flex-shrink-0">JSON 更新</span>

            </button>
          </div>`;
        return;
      }

      if (modal.status === 'error') {
        content.innerHTML = `
          <div class="p-6">
            <div class="flex items-center gap-2 mb-4">
              <div class="w-7 h-7 rounded-full bg-red-100 flex items-center justify-center">
                <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </div>
              <h3 class="font-bold text-gray-900">アップロード失敗</h3>
            </div>
            <p class="text-sm text-red-500 mb-5">${e(modal.error || '')}</p>
            <div class="flex gap-3">
              <button onclick="modal.status='idle'; renderModal()"
                class="flex-1 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700">
                やり直す
              </button>
              <button onclick="closeModal()"
                class="flex-1 py-2.5 bg-gray-100 text-gray-700 text-sm font-medium rounded-xl hover:bg-gray-200">
                閉じる
              </button>
            </div>
          </div>`;
        return;
      }

      // idle: ファイル選択画面
      const typeLabel = target.type === 'course' ? 'コース画像' : 'スポット画像';
      content.innerHTML = `
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <div>
              <h3 class="font-bold text-gray-900">画像をアップロード</h3>
              <p class="text-xs text-gray-400 mt-0.5">
                <span class="font-medium">${typeLabel}</span>: ${e(target.label)}
              </p>
              <p class="text-xs text-gray-300 font-mono mt-0.5">${e(target.imageId)}.jpg</p>
            </div>
            <button onclick="if(modal.status!=='uploading') closeModal()"
              class="text-gray-400 hover:text-gray-600 p-1">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>

          <!-- ドロップゾーン / プレビュー -->
          <div id="dropZone"
            class="relative border-2 rounded-xl overflow-hidden
                   flex items-center justify-center cursor-pointer mb-4
                   ${(modal.previewUrl || target.currentImageUrl) ? 'h-52 border-transparent' : 'h-44 border-dashed border-gray-200 hover:border-blue-400 hover:bg-blue-50/50'} transition-colors"
            onclick="document.getElementById('fileInput').click()"
            ondragover="event.preventDefault(); this.classList.add('drop-zone-active')"
            ondragleave="this.classList.remove('drop-zone-active')"
            ondrop="event.preventDefault(); this.classList.remove('drop-zone-active'); handleFileDrop(event)">
            ${modal.previewUrl
              ? `<!-- 新しい画像のプレビュー -->
                 <img src="${e(modal.previewUrl)}" alt="プレビュー"
                      class="absolute inset-0 w-full h-full object-cover">
                 <div class="absolute inset-0 bg-black/0 hover:bg-black/20 transition-colors flex items-end justify-center pb-2">
                   <span class="opacity-0 hover:opacity-100 text-white text-xs bg-black/60 px-2 py-1 rounded-lg transition-opacity">
                     クリックで変更
                   </span>
                 </div>`
              : target.currentImageUrl
              ? `<!-- 設定済み画像 -->
                 <img src="${e(target.currentImageUrl)}" alt="現在の画像"
                      class="absolute inset-0 w-full h-full object-cover">
                 <div class="absolute inset-0 bg-black/20 hover:bg-black/40 transition-colors flex flex-col items-center justify-center gap-1.5">
                   ${svgCamera('w-6 h-6 text-white drop-shadow')}
                   <span class="text-white text-xs font-medium drop-shadow">クリックまたはドラッグで画像を変更</span>
                 </div>`
              : `<div class="text-center">
                   ${svgImgIcon('w-10 h-10 text-gray-300 mx-auto mb-2')}
                   <p class="text-sm text-gray-400">クリックまたはドラッグ&ドロップ</p>
                   <p class="text-xs text-gray-300 mt-1">JPEG / PNG / HEIC</p>
                 </div>`}
          </div>

          <input id="fileInput" type="file" accept="image/*" class="hidden"
                 onchange="handleFileInput(this)">

          ${modal.file
            ? `<div class="mb-4">
                 <p class="text-xs text-gray-400">
                   📎 ${e(modal.file.name)}
                   (${(modal.file.size / 1024 / 1024).toFixed(1)} MB)
                   <button onclick="document.getElementById('fileInput').click()"
                     class="ml-2 text-blue-500 hover:text-blue-700">変更</button>
                 </p>
                 ${modal.imageCredit
                   ? `<p class="text-xs text-emerald-600 mt-1">
                        🏷 ${e(modal.imageCredit)}
                      </p>`
                   : ''}
               </div>`
            : ''}

          <!-- Wikimedia Commons パネル -->
          ${renderWikimediaPanel()}

          <div class="flex gap-3 mt-4">
            <button onclick="closeModal()"
              class="flex-1 py-2.5 bg-gray-100 text-gray-700 text-sm font-medium rounded-xl hover:bg-gray-200">
              キャンセル
            </button>
            <button onclick="doUpload()" ${!modal.file ? 'disabled' : ''}
              class="flex-1 py-2.5 text-sm font-medium rounded-xl
                     ${modal.file
                       ? 'bg-blue-600 text-white hover:bg-blue-700'
                       : 'bg-gray-100 text-gray-400 cursor-not-allowed'}">
              アップロード
            </button>
          </div>
        </div>`;
      // innerHTML 置換後、ブラウザが selected 属性を無視するケースへの対策
      requestAnimationFrame(() => {
        const sel = document.getElementById('wm-limit');
        if (sel) sel.value = String(modal.wm.limit || 5);
      });
    }

    window.handleFileInput = function (input) {
      if (input.files && input.files[0]) handleFileSelect(input.files[0]);
    };

    window.handleFileDrop = function (event) {
      const file = event.dataTransfer.files[0];
      if (file) handleFileSelect(file);
    };

    async function handleFileSelect(file) {
      modal.file = file;
      // プレビュー用 object URL を生成
      if (modal.previewUrl) URL.revokeObjectURL(modal.previewUrl);
      modal.previewUrl = URL.createObjectURL(file);
      renderModal();
    }

    // ──────────────────────────────────────────────────────────────────────────
    // Wikimedia Commons 検索パネル
    // ──────────────────────────────────────────────────────────────────────────
    function renderWikimediaPanel() {
      const wm = modal.wm;
      const inputCls = 'flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-400';

      const resultsHtml = wm.error
        ? `<p class="text-xs text-red-400 mt-2">${e(wm.error)}</p>`
        : wm.searching
          ? `<div class="flex items-center gap-2 mt-2 text-xs text-gray-400">
               <svg class="w-3.5 h-3.5 spin" fill="none" viewBox="0 0 24 24">
                 <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                 <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
               </svg>
               検索中...
             </div>`
          : wm.results.length
            ? (() => {
                const selected = wm.results.findIndex(r => r.credit === modal.imageCredit);
                const licenseOf = credit => {
                  const parts = credit.split('/').map(s => s.trim());
                  // "CC BY-SA 4.0" 相当の部分を抽出（"CC"または"Public"を含む要素）
                  const lic = parts.find(p => p.startsWith('CC') || p.startsWith('Public'));
                  return lic || parts[parts.length - 2] || credit;
                };
                return `<div class="grid grid-cols-2 gap-2 mt-3 sm:grid-cols-3">
                 ${wm.results.map((r, i) => `
                   <button onclick="selectWikimediaImage(${i})"
                     title="${e(r.credit)}"
                     class="relative rounded-xl overflow-hidden bg-gray-100 group border-2
                            ${modal.imageCredit === r.credit ? 'border-blue-500 ring-2 ring-blue-200' : 'border-transparent hover:border-blue-300'}
                            transition-all">
                     <img src="${e(r.thumbUrl)}" alt="${e(r.title)}"
                          class="w-full h-28 object-cover group-hover:opacity-90 transition-opacity"
                          onerror="this.parentElement.style.display='none'">
                     <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/70 to-transparent px-1.5 py-1.5 text-[10px] text-white leading-tight">
                       ${e(licenseOf(r.credit))}
                     </div>
                     ${modal.imageCredit === r.credit ? `
                     <div class="absolute top-1.5 right-1.5 w-5 h-5 rounded-full bg-blue-500 flex items-center justify-center">
                       <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                       </svg>
                     </div>` : ''}
                   </button>`).join('')}
               </div>
               ${selected >= 0 ? `
               <div class="mt-2 px-3 py-2 bg-blue-50 rounded-xl text-[11px] text-blue-700 leading-snug break-all">
                 🏷 ${e(wm.results[selected].credit)}
               </div>` : ''}`;
              })()
            : wm.open
              ? `<p class="text-xs text-gray-400 mt-2">「検索」を押して画像を探してください</p>`
              : '';

      return `
        <div class="border border-gray-100 rounded-xl mb-1">
          <button onclick="wmToggle()"
            class="w-full flex items-center justify-between px-4 py-3 text-sm text-gray-600 hover:bg-gray-50 rounded-xl transition-colors">
            <span class="flex items-center gap-2 font-medium">
              <svg class="w-4 h-4 text-green-600" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
              </svg>
              Wikimedia Commons から取得
            </span>
            <svg class="w-4 h-4 transition-transform ${wm.open ? 'rotate-180' : ''}"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          ${wm.open ? `
          <div class="px-4 pb-4">
            <div class="flex flex-wrap gap-2">
              <input id="wm-query" type="text" value="${e(wm.query)}"
                placeholder="スポット名・地名で検索"
                class="flex-1 min-w-0 ${inputCls}"
                onkeydown="if(event.key==='Enter') searchWikimedia()">
              <select id="wm-limit" onchange="modal.wm.limit=+this.value; localStorage.setItem('wm_limit', this.value)"
                class="flex-shrink-0 px-2 py-2 border border-gray-200 rounded-xl text-sm
                       bg-white focus:outline-none focus:ring-2 focus:ring-blue-400">
                <option value="5"  ${wm.limit===5  ? 'selected' : ''}>5件</option>
                <option value="10" ${wm.limit===10 ? 'selected' : ''}>10件</option>
                <option value="20" ${wm.limit===20 ? 'selected' : ''}>20件</option>
              </select>
              <button onclick="searchWikimedia()"
                class="flex-shrink-0 px-3.5 py-2 bg-green-600 text-white text-sm font-medium
                       rounded-xl hover:bg-green-700 transition-colors">
                検索
              </button>
            </div>
            ${resultsHtml}
            <p class="text-[10px] text-gray-300 mt-2">
              Wikimedia Commons のコンテンツはそれぞれのライセンスの下で提供されています。
            </p>
          </div>` : ''}
        </div>`;
    }

    window.wmToggle = function () {
      modal.wm.open = !modal.wm.open;
      renderModal();
      if (modal.wm.open) {
        // 開いたら input にフォーカス
        setTimeout(() => document.getElementById('wm-query')?.focus(), 50);
      }
    };

    window.searchWikimedia = async function () {
      const query = (document.getElementById('wm-query')?.value || '').trim();
      // renderModal() 前に DOM から件数を確定取得（innerHTML 置換後の select 値ズレ対策）
      const limitFromDom = parseInt(document.getElementById('wm-limit')?.value);
      if (!isNaN(limitFromDom)) modal.wm.limit = limitFromDom;
      if (!query) return;
      modal.wm.query     = query;
      modal.wm.searching = true;
      modal.wm.results   = [];
      modal.wm.error     = null;
      renderModal();

      try {
        const params = new URLSearchParams({
          action:       'query',
          generator:    'search',
          gsrnamespace: '6',
          gsrsearch:    query,
          gsrlimit:     String(modal.wm.limit || 5),
          prop:         'imageinfo',
          iiprop:       'url|extmetadata|size',
          iiurlwidth:   '400',
          format:       'json',
          origin:       '*',
        });
        const res  = await fetch(`https://commons.wikimedia.org/w/api.php?${params}`);
        const data = await res.json();
        const pages = Object.values(data.query?.pages || {});

        modal.wm.results = pages
          .filter(p => p.imageinfo?.length)
          .map(p => {
            const info = p.imageinfo[0];
            const meta = info.extmetadata || {};

            // アーティスト名（HTML タグを除去）
            const artistHtml  = meta.Artist?.value || '';
            const artistText  = artistHtml.replace(/<[^>]+>/g, '').trim() || '不明';
            const license     = meta.LicenseShortName?.value || '';
            const credit      = `© ${artistText} / ${license} / Wikimedia Commons`;

            return {
              title:    p.title.replace('File:', ''),
              thumbUrl: info.thumburl || info.url,
              fullUrl:  info.url,
              credit,
            };
          });

        if (!modal.wm.results.length) {
          modal.wm.error = '画像が見つかりませんでした。別のキーワードで試してください。';
        }
      } catch (err) {
        modal.wm.error = `検索失敗: ${err.message}`;
      } finally {
        modal.wm.searching = false;
        renderModal();
      }
    };

    window.selectWikimediaImage = async function (index) {
      const candidate = modal.wm.results[index];
      if (!candidate) return;

      showToast('画像を取得中...', 'info');
      try {
        // Wikimedia の画像を Blob で取得
        const res = await fetch(candidate.fullUrl, { mode: 'cors' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const blob = await res.blob();
        const file = new File([blob], `${candidate.title}.jpg`, { type: blob.type || 'image/jpeg' });

        modal.imageCredit = candidate.credit;
        await handleFileSelect(file);  // プレビュー表示 + modal.file 設定（renderModal も呼ばれる）
        showToast('画像を選択しました', 'success');
      } catch (err) {
        showToast(`画像の取得に失敗しました: ${err.message}`, 'error');
      }
    };

    // ──────────────────────────────────────────────────────────────────────────
    // アップロード実行
    // ──────────────────────────────────────────────────────────────────────────
    window.doUpload = async function () {
      if (!modal.file) return;

      const target = modal.target;
      modal.status   = 'uploading';
      modal.progress = 0;
      renderModal();

      try {
        // 1. JPEG に変換
        setProgress(5, 'JPEG に変換中...');
        const jpegBlob = await fileToJpeg(modal.file);

        // 2. presigned URL を取得
        setProgress(15, 'アップロード URL を取得中...');
        const presignRes = await fetch(`${API_BASE_URL}/presigned-url`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
          body:    JSON.stringify({ type: target.type, imageId: target.imageId }),
        });
        if (!presignRes.ok) throw new Error(`presigned-url: HTTP ${presignRes.status}`);
        const { uploadUrl, publicUrl, cfPath } = await presignRes.json();

        // 3. S3 に直接アップロード（XHR で進捗取得）
        setProgress(20, 'S3 にアップロード中...');
        await uploadToS3(uploadUrl, jpegBlob, (pct) => {
          setProgress(20 + Math.round(pct * 0.6), `S3 にアップロード中... ${pct}%`);
        });

        // 4. 後処理（JSON 更新 + CF invalidation）
        setProgress(85, 'キャッシュをクリア中...');
        const completeRes = await fetch(`${API_BASE_URL}/complete-upload`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
          body:    JSON.stringify({
            type:           target.type,
            imageId:        target.imageId,
            courseJsonPath: target.courseJsonPath,
            courseId:       target.courseId,
            spotId:         target.spotId,
            imageCredit:    modal.imageCredit || null,
          }),
        });
        if (!completeRes.ok) throw new Error(`complete-upload: HTTP ${completeRes.status}`);
        const result = await completeRes.json();

        setProgress(100, '完了');

        // 成功後にメモリ上の state も更新
        cacheBustMap.set(publicUrl, Date.now());
        updateStateAfterUpload(target, publicUrl);

        // ログに追加
        uploadLog.unshift({
          ts: new Date(), label: target.label, type: target.type,
          publicUrl, invalidatedPaths: result.invalidatedPaths,
          invalidationId: result.invalidationId, success: true, error: null,
        });

        modal.status = 'success';
        modal.result = result;
        renderModal();
        showToast(`✓ ${target.label} の画像をアップロードしました`, 'success');

      } catch (err) {
        modal.status = 'error';
        modal.error  = err.message;
        renderModal();
        uploadLog.unshift({
          ts: new Date(), label: target.label, type: target.type,
          publicUrl: null, invalidatedPaths: [], success: false, error: err.message,
        });
        showToast(`アップロード失敗: ${err.message}`, 'error');
      }
    };

    function setProgress(pct, text) {
      modal.progress = pct;
      const bar  = document.getElementById('progressBar');
      const txt  = document.getElementById('progressText');
      if (bar) bar.style.width = pct + '%';
      if (txt) txt.textContent  = text || pct + '%';
    }

    /** XHR で S3 presigned URL に PUT アップロード（進捗コールバック付き）*/
    function uploadToS3(url, blob, onProgress) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('PUT', url, true);
        xhr.setRequestHeader('Content-Type', 'image/jpeg');
        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100));
        };
        xhr.onload  = () => (xhr.status >= 200 && xhr.status < 300) ? resolve() : reject(new Error(`S3 PUT ${xhr.status}`));
        xhr.onerror = () => reject(new Error('S3 アップロードに失敗しました'));
        xhr.send(blob);
      });
    }

    /** 任意の画像ファイルを JPEG Blob に変換する（最大辺 2048px） */
    function fileToJpeg(file, maxDim = 2048, quality = 0.92) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const objUrl = URL.createObjectURL(file);
        img.onload = () => {
          let { naturalWidth: w, naturalHeight: h } = img;
          if (w > maxDim || h > maxDim) {
            if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
            else       { w = Math.round(w * maxDim / h); h = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width  = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(blob => {
            URL.revokeObjectURL(objUrl);
            blob ? resolve(blob) : reject(new Error('JPEG 変換に失敗しました'));
          }, 'image/jpeg', quality);
        };
        img.onerror = () => { URL.revokeObjectURL(objUrl); reject(new Error('画像の読み込みに失敗しました')); };
        img.src = objUrl;
      });
    }

    /** アップロード後に state.draft を更新して即時反映させる
     *  complete-upload はドラフトのみ更新するため、本番の state.detail は変更しない */
    function updateStateAfterUpload(target, publicUrl) {
      // ドラフトがなければ本番 JSON を深コピーしてドラフトを作成
      if (!state.draft && state.detail) {
        state.draft = JSON.parse(JSON.stringify(state.detail));
      }
      if (!state.draft) return;

      if (target.type === 'course') {
        state.draft.coverImageUrl = publicUrl;
        if (modal.imageCredit) state.draft.imageCredit = modal.imageCredit;
      } else if (target.type === 'spot' && target.spotId) {
        const updateSpot = (spots) => {
          const spot = spots.find(s => s.spotId === target.spotId);
          if (spot) {
            spot.coverImageUrl = publicUrl;
            if (modal.imageCredit) spot.imageCredit = modal.imageCredit;
            else delete spot.imageCredit;
            return true;
          }
          return false;
        };
        if (state.draft.sections) {
          for (const sec of state.draft.sections) {
            if (updateSpot(sec.spots || [])) break;
          }
        } else {
          updateSpot(state.draft.spots || []);
        }
      }
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast');
      const id = 'toast-' + Date.now();
      const colors = {
        success: 'bg-emerald-600 text-white',
        error:   'bg-red-600 text-white',
        info:    'bg-gray-800 text-white',
      };
      const div = document.createElement('div');
      div.id        = id;
      div.className = `${colors[type] || colors.info} px-4 py-2.5 rounded-xl text-sm shadow-lg slide-up pointer-events-auto max-w-sm`;
      div.textContent = message;
      container.appendChild(div);
      setTimeout(() => div.remove(), 4000);
    }

    function allSpots(d) {
      if (Array.isArray(d.sections) && d.sections.length > 0) {

    /** coverImageUrl から imageId（拡張子なし）を取得する */
    function getImageIdFromUrl(url) {
      const filename = url.split('/').pop();

    /** コース画像の imageId（S3 ファイル名なし拡張子） */
    function getCourseImageId(courseSummary) {
      if (courseSummary.coverImageUrl) return getImageIdFromUrl(courseSummary.coverImageUrl);
      // フォールバック: jsonPath のファイル名を使用
      return courseSummary.jsonPath.split('/').pop().replace(/\.json$/, '');
    }

    /** スポット画像の imageId */
    function getSpotImageId(spot) {
      if (spot.coverImageUrl) return getImageIdFromUrl(spot.coverImageUrl);

    /** テキストをクリップボードにコピーする */
    window.copyText = async function (text) {

        showToast(`コピーしました: ${text}`, 'info');
      } catch {
        // フォールバック
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity  = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(`コピーしました: ${text}`, 'info');

    /** コース JSON をファイルとしてダウンロードする */
    window.downloadJson = function (type) {
      const data = type === 'draft' ? state.draft : state.detail;

      const baseName = (state.currentSummary?.jsonPath || 'course.json').split('/').pop();
      const filename = type === 'draft' ? `draft_${baseName}` : baseName;
      const blob = new Blob(
        [JSON.stringify(data, null, 2)],
        { type: 'application/json' },
      );
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    };

    function e(s) {

    window.handleJsonFileInput = function (input) {
      const file = input.files && input.files[0];
      if (!file) return;
      jm.file = file;
      jm.parsed = null;
      jm.parseErr = null;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.id || !data.title) throw new Error('id または title フィールドがありません');
          jm.parsed = data;
        } catch (err) {
          jm.parseErr = err.message;
        }
        renderJsonModal();
      };
      reader.readAsText(file);
    };

    window.doJsonUpload = async function () {
      if (!jm.file || !jm.parsed || jm.parseErr) return;
      jm.status = 'uploading';
      renderJsonModal();
      try {
        const res = await fetch(`${API_BASE_URL}/upload-json`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
          body:    JSON.stringify({
            courseJsonPath: jm.summary.jsonPath,
            jsonData:       jm.parsed,
          }),
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `HTTP ${res.status}`);
        }
        draftMap.set(jm.summary.id, jm.parsed);
        jm.status = 'success';
        renderJsonModal();
        if (state.view === 'list') {
          renderList();
        } else if (state.view === 'detail' && state.currentSummary?.id === jm.summary.id) {
          // 詳細画面から差し替えた場合はドラフットを即時反映
          state.draft  = jm.parsed;
          state.detail = jm.parsed;
          closeJsonModal();
          renderDetail();
        }
        showToast(`✓ ${jm.summary.title} のドラフットを保存しました`, 'success');
      } catch (err) {
        jm.status = 'error';
        jm.error  = err.message;
        renderJsonModal();
        showToast(`アップロード失敗: ${err.message}`, 'error');
      }
    };

    // ──────────────────────────────────────────────────────────────────────────
    // 一覧からのパブリッシュ
    // ──────────────────────────────────────────────────────────────────────────
    window.doPublishFromList = async function (courseId) {
      const summary = state.courses.find(c => c.id === courseId);
      if (!summary) return;
      if (!confirm(`「${summary.title}」のドラフットを本番に適用しますか？`)) return;

      showToast('本番に適用中...', 'info');
      try {
        const res = await fetch(`${API_BASE_URL}/publish`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
          body:    JSON.stringify({ courseJsonPath: summary.jsonPath, courseId: summary.id }),
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `HTTP ${res.status}`);
        }
        const result = await res.json();

        // draftMap から取得（セッション内データが優先、_metaOnly の場合はスキップ）
        const draftEntry = draftMap.get(courseId);
        const draft = (draftEntry && !draftEntry._metaOnly) ? draftEntry : null;
        summary.version   = result.newVersion;
        summary.updatedAt = new Date().toISOString();
        if (draft && draft.coverImageUrl) summary.coverImageUrl = draft.coverImageUrl;
        if (draft) summary.spotCount = allSpotsFromData(draft).length;
        delete summary._isNew;  // 本番 JSON が存在するようになったのでフラグを解除

        draftMap.delete(courseId);
        renderList();
        showToast(`✓ 本番に適用しました（v${result.newVersion}）`, 'success');
      } catch (err) {
        showToast(`適用失敗: ${err.message}`, 'error');
      }
    };

      showToast('削除中...', 'info');
      try {
        const res = await fetch(`${API_BASE_URL}/delete-course`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
          body:    JSON.stringify({ courseJsonPath: jsonPath, courseId: id }),
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `HTTP ${res.status}`);
        }
        state.courses = state.courses.filter(c => c.id !== id);
        draftMap.delete(id);
        showToast(`「${title}」を削除しました`, 'success');
        goBack();

    /** spotId でスポットを検索する（sections / flat 両対応）*/
    function findSpotById(data, spotId) {
      if (data.sections) {
        for (const sec of data.sections) {
          const s = (sec.spots || []).find(s => s.spotId === spotId);
          if (s) return s;
        }
        return null;
      }
      return (data.spots || []).find(s => s.spotId === spotId) || null;
    }

    window.doSaveSpotEdit = async function () {
      const nameVal = (document.getElementById('sem-name')?.value || '').trim();
      if (!nameVal) { showToast('スポット名は必須です', 'error'); return; }

      const btn = document.getElementById('sem-save-btn');
      if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }

      try {
        // ドラフット（なければ本番をディープコピー）に編集を適用
        const draft = JSON.parse(JSON.stringify(state.draft || state.detail));

        const descVal = (document.getElementById('sem-desc')?.value || '').trim();
        const addrVal = (document.getElementById('sem-addr')?.value || '').trim();
        const latRaw  = document.getElementById('sem-lat')?.value;
        const lonRaw  = document.getElementById('sem-lon')?.value;
        const radRaw  = document.getElementById('sem-rad')?.value;
        const lat     = parseFloat(latRaw);
        const lon     = parseFloat(lonRaw);
        const rad     = parseInt(radRaw);

        const applyEdit = (spot) => {
          spot.name = nameVal;
          if (descVal) spot.spotDescription = descVal; else delete spot.spotDescription;
          if (addrVal) spot.address = addrVal;          else delete spot.address;
          if (!isNaN(lat)) spot.latitude  = lat;
          if (!isNaN(lon)) spot.longitude = lon;
          if (!isNaN(rad) && rad > 0) spot.recognitionRadiusMeters = rad;
        };

        let found = false;
        if (draft.sections) {
          for (const sec of draft.sections) {
            const spot = (sec.spots || []).find(s => s.spotId === sem.spotId);
            if (spot) { applyEdit(spot); found = true; break; }
          }
        } else {
          const spot = (draft.spots || []).find(s => s.spotId === sem.spotId);
          if (spot) { applyEdit(spot); found = true; }
        }
        if (!found) throw new Error('スポットが見つかりません');

        const res = await fetch(`${API_BASE_URL}/upload-json`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
          body:    JSON.stringify({
            courseJsonPath: state.currentSummary.jsonPath,
            jsonData:       draft,
          }),
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `HTTP ${res.status}`);

        state.draft = draft;
        if (state.currentSummary?._isNew) state.detail = draft;
        closeSpotEditModal();
        renderDetail();
        showToast('スポット情報を更新しました', 'success');

        if (btn) { btn.disabled = false; btn.textContent = '保存'; }
        showToast(`保存失敗: ${err.message}`, 'error');

    function generateSpotId(draft) {
      // コース ID から短縮プレフィックスを生成し、既存スポット数+1 で連番付与
      const courseId = (draft.id || '').replace(/^course-/, '').replace(/-\d+$/, '');
      const words    = courseId.split('-').slice(0, 3);
      const prefix   = words.map(w => w.slice(0, 3)).join('-');
      const existing = allSpotsFromData(draft);
      const num      = String(existing.length + 1).padStart(3, '0');
      return `${prefix}-${num}`;
    }

    window.doAddSpot = async function () {
      const nameVal = (document.getElementById('asm-name')?.value || '').trim();
      const spotId  = (document.getElementById('asm-id')?.value   || '').trim();
      if (!nameVal) { showToast('スポット名は必須です', 'error'); return; }
      if (!spotId)  { showToast('スポット ID は必須です', 'error'); return; }

      const source = state.draft || state.detail;
      // 重複 ID チェック
      if (source && allSpotsFromData(source).some(s => s.spotId === spotId)) {
        showToast(`スポット ID "${spotId}" は既に使われています`, 'error'); return;
      }

      const addrVal = (document.getElementById('asm-addr')?.value || '').trim();
      const descVal = (document.getElementById('asm-desc')?.value || '').trim();
      const latRaw  = document.getElementById('asm-lat')?.value;
      const lonRaw  = document.getElementById('asm-lon')?.value;
      const radRaw  = document.getElementById('asm-rad')?.value;
      const lat     = latRaw ? parseFloat(latRaw) : null;
      const lon     = lonRaw ? parseFloat(lonRaw) : null;
      const rad     = radRaw ? parseInt(radRaw)   : null;

      const btn = document.getElementById('asm-save-btn');
      if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }

      try {
        const draft   = JSON.parse(JSON.stringify(source));
        const hasSec  = Array.isArray(draft.sections) && draft.sections.length > 0;
        const newSpot = {
          spotId,
          name:       nameVal,
          orderIndex: 0,           // 追加後に末尾 orderIndex を設定
          latitude:   (!isNaN(lat) && lat !== null) ? lat : null,
          longitude:  (!isNaN(lon) && lon !== null) ? lon : null,
          ...(addrVal && { address: addrVal }),
          ...(descVal && { spotDescription: descVal }),
          ...(rad > 0  && { recognitionRadiusMeters: rad }),
          coverImageUrl: null,
        };

        if (hasSec) {
          const sectionId = document.getElementById('asm-section')?.value;
          const sec = draft.sections.find(s => s.sectionId === sectionId);
          if (!sec) throw new Error('セクションが見つかりません');
          newSpot.orderIndex = (sec.spots || []).length;
          sec.spots = [...(sec.spots || []), newSpot];
        } else {
          newSpot.orderIndex = (draft.spots || []).length;
          draft.spots = [...(draft.spots || []), newSpot];
        }

        const res = await fetch(`${API_BASE_URL}/upload-json`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
          body:    JSON.stringify({
            courseJsonPath: state.currentSummary.jsonPath,
            jsonData:       draft,
          }),
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `HTTP ${res.status}`);
        }

        state.draft = draft;
        if (state.currentSummary?._isNew) state.detail = draft;
        closeAddSpotModal();
        renderDetail();
        showToast(`「${nameVal}」を追加しました`, 'success');
      } catch (err) {
        if (btn) { btn.disabled = false; btn.textContent = '追加'; }
        showToast(`追加失敗: ${err.message}`, 'error');
      }
    };

      const cls = {

        ok:    'text-emerald-400',
      }[type] || 'text-gray-300';
      const line = document.createElement('div');
      line.className = cls;
      line.textContent = text;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;

    window.doGeocode = async function () {
      if (gm.running) return;
      if (!gmApiKey) { showToast('API キーを設定してください', 'error'); return; }
      gm.running   = true;
      gm.abortFlag = false;
      gm.logs      = [];

      const startBtn  = document.getElementById('gm-start-btn');
      const closeBtn  = document.getElementById('gm-close-btn');
      const logEl     = document.getElementById('gm-log');
      if (startBtn) { startBtn.disabled = true; startBtn.textContent = '補完中...'; }
      if (closeBtn)   closeBtn.disabled = true;
      if (logEl)      logEl.innerHTML   = '';

      try {
        // ドラフット（なければ本番をディープコピー）をベースに編集
        const draft = JSON.parse(JSON.stringify(state.draft || state.detail));
        const spots = allSpotsFromData(draft);

        const courseName = draft.title || state.currentSummary?.id || '';
        gmLog('info', `コース: ${courseName}`);
        gmLog('info', `スポット数: ${spots.length}`);
        gmLog('info', '');

        let updated = 0;
        let skipped = 0;

        for (const spot of spots) {
          if (gm.abortFlag) { gmLog('warn', '--- 中断しました ---'); break; }

          const name   = spot.name || '';
          const oldLat = spot.latitude;
          const oldLon = spot.longitude;

          // latitude/longitude が両方 null → GPS対象外のためスキップ
          if (oldLat == null && oldLon == null) {
            gmLog('skip', `[SKIP] ${name}（座標なし・GPS対象外）`);
            skipped++;
            continue;
          }

          const addr  = spot.address || '';
          const query = `${name} ${addr}`.trim();
          gmLog('info', `[検索] ${query}`);

          let newLat, newLon;
          try {
            const url    = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(query)}&key=${gmApiKey}&language=ja`;
            const res    = await fetch(url);
            const data   = await res.json();
            if (data.status === 'OK') {
              const loc = data.results[0].geometry.location;
              newLat = loc.lat;
              newLon = loc.lng;
            } else {
              gmLog('warn', `  [WARN] Geocoding失敗 status=${data.status}`);
              skipped++;
              gmLog('info', '');
              continue;
            }
          } catch (err) {
            gmLog('error', `  [ERROR] リクエスト失敗: ${err.message}`);
            skipped++;
            gmLog('info', '');
            continue;
          }

          gmLog('info',  `  旧: (${oldLat}, ${oldLon})`);
          gmLog('ok',    `  新: (${newLat}, ${newLon})`);

          const latDiff = Math.abs(newLat - (oldLat || 0));
          const lonDiff = Math.abs(newLon - (oldLon || 0));
          if (latDiff > 0.01 || lonDiff > 0.01) {
            gmLog('warn', `  [!] 座標が大きくズレています（Δlat=${latDiff.toFixed(4)}, Δlng=${lonDiff.toFixed(4)}）要確認`);
          }

          spot.latitude  = newLat;
          spot.longitude = newLon;
          updated++;
          gmLog('info', '');

          // API制限対策: 1リクエストあたり 0.15秒待機
          await new Promise(r => setTimeout(r, 150));
        }

        gmLog('info', '--- 完了 ---');
        gmLog('ok',   `更新: ${updated}件 / スキップ: ${skipped}件`);

        if (updated > 0) {
          // ドラフットとして保存
          gmLog('info', 'ドラフットに保存中...');
          const saveRes = await fetch(`${API_BASE_URL}/upload-json`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
            body:    JSON.stringify({
              courseJsonPath: state.currentSummary.jsonPath,
              jsonData:       draft,
            }),
          });
          if (!saveRes.ok) {
            const errBody = await saveRes.json().catch(() => ({}));
            throw new Error(errBody.error || `HTTP ${saveRes.status}`);
          }
          state.draft = draft;
          gmLog('ok',  'ドラフットを保存しました。詳細画面の「本番に反映」で適用できます。');

          // 詳細画面を再描画（モーダルは開いたまま）
          renderDetail();
          // 再描画後にモーダルを再表示（renderDetail が mount を上書きするため）
          const el = document.getElementById('geocodeModal');
          if (el) { el.classList.remove('hidden'); el.classList.add('flex'); }
        } else {
          gmLog('info', '更新対象がなかったためドラフットへの保存はスキップしました。');
        }

      } catch (err) {
        gmLog('error', `[ERROR] ${err.message}`);
      } finally {
        gm.running = false;
        const sb = document.getElementById('gm-start-btn');
        const cb = document.getElementById('gm-close-btn');
        if (sb) { sb.disabled = false; sb.textContent = '再実行'; }
        if (cb) cb.disabled = false;
      }
    };

      if (!titleVal) { showToast('コースタイトルは必須です', 'error'); return; }

        showToast('認識範囲は正の数値を入力してください', 'error'); return;
      }

      const selectedCats = Object.keys(CAT).filter(id =>

      const btn = document.getElementById('cem-save-btn');

        const draft = JSON.parse(JSON.stringify(state.draft || state.detail));
        draft.title      = titleVal;
        draft.summary    = summaryVal || null;

        if (radiusRaw && !isNaN(radius) && radius > 0) {
          draft.recognitionRadiusMeters = radius;
        }

          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
          body:    JSON.stringify({

            jsonData:       draft,
          }),

    window.doDeleteSpot = async function (spotId) {
      // 削除対象スポット名を取得して確認ダイアログ
      const source = state.draft || state.detail;
      const spot   = source ? findSpotById(source, spotId) : null;
      const name   = spot?.name || spotId;
      if (!confirm(`「${name}」を削除しますか？\nこの操作はドラフットに記録されます。本番に反映するまで元に戻せます。`)) return;

      try {
        const draft = JSON.parse(JSON.stringify(state.draft || state.detail));

        let deleted = false;
        if (draft.sections) {
          for (const sec of draft.sections) {
            const before = (sec.spots || []).length;
            sec.spots = (sec.spots || []).filter(s => s.spotId !== spotId);
            if (sec.spots.length < before) {
              // orderIndex を詰め直す
              sec.spots.forEach((s, i) => { s.orderIndex = i; });
              deleted = true;
              break;
            }
          }
        } else {
          const before = (draft.spots || []).length;
          draft.spots = (draft.spots || []).filter(s => s.spotId !== spotId);
          if (draft.spots.length < before) {
            draft.spots.forEach((s, i) => { s.orderIndex = i; });
            deleted = true;
          }
        }
        if (!deleted) throw new Error('スポットが見つかりません');

        const res = await fetch(`${API_BASE_URL}/upload-json`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': ADMIN_SECRET },
          body:    JSON.stringify({
            courseJsonPath: state.currentSummary.jsonPath,
            jsonData:       draft,
          }),
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `HTTP ${res.status}`);
        }

        state.draft = draft;
        if (state.currentSummary?._isNew) state.detail = draft;
        renderDetail();
        showToast(`「${name}」を削除しました`, 'success');
      } catch (err) {
        showToast(`削除失敗: ${err.message}`, 'error');
      }
    };
